name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexys-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nexys-web/package-lock.json
      - name: Install
        run: npm ci
      - name: Build (static export)
        env:
          # GitHub Pages는 /<repo> 서브경로로 서빙됨
          NEXT_PUBLIC_BASE_PATH: /nexys-website
          NEXT_PUBLIC_SITE_ORIGIN: https://kim-hakseong.github.io
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: nexys-web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
